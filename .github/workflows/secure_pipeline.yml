name: Secure Pipeline

on:
  pull_request:
    branches:
      - test

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  security-check:

    runs-on: ubuntu-latest

    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests

      - name: Security Check
        run: |
          python src/ci_cd/security_check.py sample.c

      - name: Run Tests
        run: |
          pytest

      - name: Telegram Inicio
        run: |
          python - <<EOF
          import requests, os
          requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "🔍 Pipeline iniciado"
              }
          )
          EOF

      - name: Telegram Código Seguro
        if: success()
        run: |
          python - <<EOF
          import requests, os
          requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "✅ Código seguro"
              }
          )
          EOF

      - name: Telegram Tests
        if: success()
        run: |
          python - <<EOF
          import requests, os
          requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "🧪 Tests exitosos"
              }
          )
          EOF

      - name: Telegram Merge Test
        if: success()
        run: |
          python - <<EOF
          import requests, os
          r = requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "🚀 Merge a test realizado correctamente"
              }
          )
          print(r.text)
          EOF

      - name: Add fixing-required label
        if: failure()
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: fixing-required

      - name: Add tests-failed label
        if: failure()
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: tests-failed

      - name: Create Issue
        if: failure()
        uses: dacbd/create-issue-action@main
        with:
          token: ${{ github.token }}
          title: Vulnerabilidad detectada
          body: |
            El pipeline detectó un error o vulnerabilidad.

            PR:
            ${{ github.event.pull_request.html_url }}

      - name: Comment Pull Request
        if: failure()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ❌ Vulnerabilidad detectada.
            El pipeline fue bloqueado.

      - name: Telegram Pipeline Fallido
        if: failure()
        run: |
          python - <<EOF
          import requests, os
          requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "❌ Pipeline fallido"
              }
          )
          EOF