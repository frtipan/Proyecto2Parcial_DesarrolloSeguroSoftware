name: Secure Pipeline

on:
  pull_request:
    branches:
      - test

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:

  security-check:

    runs-on: ubuntu-latest

    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install requests pytest

      - name: Telegram Inicio
        run: |
          python - <<EOF
          import requests, os

          requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "🔍 Inicio revisión de seguridad"
              }
          )
          EOF

      - name: Security Check
        id: security
        continue-on-error: true
        run: |
          python src/ci_cd/security_check.py sample.c

      - name: Run Tests
        if: steps.security.outcome == 'success'
        run: |
          pytest

      - name: Telegram Pipeline Exitoso
        if: steps.security.outcome == 'success'
        run: |
          python - <<EOF
          import requests, os

          requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "✅ Pipeline exitoso"
              }
          )
          EOF

      - name: Comment Pull Request
        if: steps.security.outcome == 'failure'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ❌ Vulnerabilidad detectada por IA

            Resultado: VULNERABLE

            El merge fue bloqueado.

      - name: Create Issue
        if: steps.security.outcome == 'failure'
        uses: dacbd/create-issue-action@main
        with:
          token: ${{ github.token }}
          title: Vulnerabilidad detectada
          body: |
            El pipeline detectó una vulnerabilidad.

            Pull Request:
            ${{ github.event.pull_request.html_url }}

      - name: Telegram Vulnerabilidad
        if: steps.security.outcome == 'failure'
        run: |
          python - <<EOF
          import requests, os

          requests.post(
              f"https://api.telegram.org/bot{os.environ['TELEGRAM_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ["TELEGRAM_CHAT_ID"],
                  "text": "🚨 Vulnerabilidad detectada. PR bloqueado."
              }
          )
          EOF

      - name: Fail Job
        if: steps.security.outcome == 'failure'
        run: |
          exit 1