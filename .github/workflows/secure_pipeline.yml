name: Secure Pipeline

on:
  pull_request:
    branches:
      - test

jobs:

  security-check:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Security Check
        run: |
          python src/ci_cd/security_check.py sample.c

      - name: Run Tests
        run: |
          pytest