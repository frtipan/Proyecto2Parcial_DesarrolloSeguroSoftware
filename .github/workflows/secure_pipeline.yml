name: Secure Pipeline

on:
  pull_request:
    branches:
      - test

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:

  security-check:

    runs-on: ubuntu-latest

    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Telegram Inicio
        run: |
          python -c "from backend.notifications.telegram_bot import send_message; send_message('🔍 Inicio de revisión de seguridad')"

      - name: Security Check
        run: |
          python src/ci_cd/security_check.py sample.c

      - name: Telegram Código Seguro
        if: success()
        run: |
          python -c "from backend.notifications.telegram_bot import send_message; send_message('✅ Código seguro - Continuando pipeline')"

      - name: Telegram Tests
        if: success()
        run: |
          python -c "from backend.notifications.telegram_bot import send_message; send_message('🧪 Tests ejecutándose')"

      - name: Run Tests
        if: success()
        run: |
          pytest

      - name: Telegram Tests Exitosos
        if: success()
        run: |
          python -c "from backend.notifications.telegram_bot import send_message; send_message('✅ Tests exitosos')"

      - name: Add fixing-required label
        if: failure()
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: fixing-required

      - name: Add tests-failed label
        if: failure()
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: tests-failed

      - name: Create Issue
        if: failure()
        uses: dacbd/create-issue-action@main
        with:
          token: ${{ github.token }}
          title: Vulnerabilidad o error detectado
          body: |
            El pipeline detectó una vulnerabilidad o error.

            Repositorio:
            ${{ github.repository }}

            Pull Request:
            ${{ github.event.pull_request.html_url }}

            Revisar el código antes de realizar el merge.

      - name: Comment Pull Request
        if: failure()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            ❌ Vulnerabilidad detectada por IA

            El pipeline fue bloqueado.

            Revisar el código vulnerable y corregirlo antes de continuar.

      - name: Telegram Pipeline Fallido
        if: failure()
        run: |
          python -c "from backend.notifications.telegram_bot import send_message; send_message('❌ Pipeline fallido - PR bloqueado')"